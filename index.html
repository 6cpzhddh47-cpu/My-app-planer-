<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffe4ec">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Planner">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
  <title>Daily Planner</title>
</head>
<body>
<div id="app">

  <!-- ЭКРАН: ПЛАН -->
  <div id="screen-today" class="screen active">
    <header>
      <div class="header-row">
        <div class="date-block">
          <span id="day-name">Загрузка...</span>
          <span id="date-str"></span>
        </div>
        <button class="add-btn" onclick="openAddModal()">+</button>
      </div>
      <div class="progress-block">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span id="progress-text">0 / 0</span>
      </div>
    </header>

    <div class="view-tabs">
      <button class="view-tab active" data-view="day"   onclick="setView('day')">День</button>
      <button class="view-tab"        data-view="week"  onclick="setView('week')">Неделя</button>
      <button class="view-tab"        data-view="month" onclick="setView('month')">Месяц</button>
    </div>

    <main id="task-list"></main>

    <nav>
      <button class="nav-btn active" onclick="showScreen('today')">📋 План</button>
      <button class="nav-btn"        onclick="showScreen('stats')">📊 Статистика</button>
    </nav>
  </div>

  <!-- ЭКРАН: СТАТИСТИКА -->
  <div id="screen-stats" class="screen">
    <header>
      <div class="header-row">
        <div class="date-block"><span>Статистика</span></div>
      </div>
    </header>
    <main id="stats-content"><div class="loading">Загружаем...</div></main>
    <nav>
      <button class="nav-btn"        onclick="showScreen('today')">📋 План</button>
      <button class="nav-btn active" onclick="showScreen('stats')">📊 Статистика</button>
    </nav>
  </div>

</div>

<!-- МОДАЛКА ДОБАВЛЕНИЯ ЗАДАЧИ -->
<div id="modal-overlay" class="modal-overlay" onclick="handleOverlayClick(event)"></div>

<script>
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
</script>
<script src="app.js"></script>
</body>
</html>
